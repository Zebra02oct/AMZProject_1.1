name: linter

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    # environment: Testing # Komentari jika tidak ada settingan Environment di repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Hapus bagian ini jika Anda TIDAK menggunakan Flux UI berbayar
      - name: Add Flux Credentials from Secrets
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Install Node Dependencies
        run: npm ci

      - name: Run PHP Linting (Pint)
        run: php ./vendor/bin/pint # Hapus --test agar dia otomatis memperbaiki

      # AKTIFKAN INI: Agar GitHub otomatis nge-commit file yang sudah dirapikan
      - name: Auto Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: fix code formatting with Pint'
          commit_options: '--no-verify'
